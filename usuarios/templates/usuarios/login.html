{% extends "base.html" %}
{% block title %}Login - CodeRibeirinho{% endblock %}
{% block content %}

        <h2>Jogo Educativo - CodeRibeirinho</h2>
        <p>Faça seu Login para acessar</p>

        <form method="post">
            {% csrf_token %}
            <label for="email">E-mail</label>
            <input type="text" id="email" name="email" required>
            
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
            <a href="{% url 'politica_privacidade' %}" style="text-decoration: none;">Política de privacidade</a>
            <button type="submit">Entrar</button>
        </form>

{% endblock %}
